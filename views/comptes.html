<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LBF Stock — Gestion des comptes</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/comptes.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="nav">
    <a href="stock.html" class="nav-brand">⚙ LBF Stock</a>
    <div class="nav-links">
      <a href="stock.html"        class="nav-link"><span>Inventaire</span></a>
      <a href="demandes.html"     class="nav-link"><span>Demandes</span></a>
      <a href="bibliotheque.html" class="nav-link"><span>Bibliothèque</span></a>
      <a href="comptes.html"      class="nav-link active"
         data-require-role="administration"><span>Comptes</span></a>
    </div>
    <div class="nav-user">
      <span class="nav-user-name" id="userDisplay"></span>
      <span id="roleDisplay" class="role-badge"></span>
      <button id="logoutBtn" class="btn btn-ghost btn-sm">Déconnexion</button>
    </div>
  </nav>

  <div class="page-wrapper">
    <div class="container">

      <!-- En-tête -->
      <div class="page-header">
        <h1 class="page-title">Gestion des comptes</h1>
        <button id="addUserBtn" class="btn btn-primary btn-sm">
          + Nouveau compte
        </button>
      </div>

      <!-- Tableau des utilisateurs -->
      <div class="table-wrapper">
        <table class="data-table users-table">
          <thead>
            <tr>
              <th class="col-username">Identifiant</th>
              <th class="col-nom">Nom complet</th>
              <th class="col-role">Rôle</th>
              <th class="col-actif">Actif</th>
              <th class="col-created">Créé le</th>
              <th class="col-actions">Actions</th>
            </tr>
          </thead>
          <tbody id="usersTableBody">
            <tr>
              <td colspan="6">
                <div class="loader">
                  <div class="spinner"></div>
                  Chargement…
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>

  <!-- ── Modal : Créer / Modifier un compte ────────────────── -->
  <div id="userModal" class="modal-overlay" hidden>
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="userModalTitle">Nouveau compte</h2>
        <button class="modal-close" id="userModalClose">×</button>
      </div>
      <div class="modal-body">
        <form id="userForm" novalidate>
          <input type="hidden" id="uf-id">
          <div class="form-grid">
            <div class="form-group">
              <label class="form-label">Prénom <span class="required">*</span></label>
              <input type="text" id="uf-prenom" class="form-control" required>
            </div>
            <div class="form-group">
              <label class="form-label">Nom <span class="required">*</span></label>
              <input type="text" id="uf-nom" class="form-control" required>
            </div>
            <div class="form-group">
              <label class="form-label">Identifiant <span class="required">*</span></label>
              <input type="text" id="uf-username" class="form-control"
                     placeholder="p.dupont" required autocomplete="off">
              <span class="form-hint">Minuscules, points autorisés. Ne peut pas être modifié.</span>
            </div>
            <div class="form-group">
              <label class="form-label">Rôle <span class="required">*</span></label>
              <select id="uf-role" class="form-control" required>
                <option value="consultation">Consultation</option>
                <option value="gestion">Gestion</option>
                <option value="administration">Administration</option>
              </select>
            </div>
            <div class="form-group span-2 password-group">
              <label class="form-label" id="passwordLabel">
                Mot de passe <span class="required">*</span>
              </label>
              <input type="password" id="uf-password" class="form-control"
                     autocomplete="new-password">
              <div class="password-hint" id="passwordHint">
                Minimum 8 caractères.
              </div>
              <div class="password-strength" id="passwordStrength">
                <div class="strength-bar" id="sb1"></div>
                <div class="strength-bar" id="sb2"></div>
                <div class="strength-bar" id="sb3"></div>
                <div class="strength-bar" id="sb4"></div>
              </div>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="userModalCancel">Annuler</button>
        <button class="btn btn-primary"   id="userModalSave">Enregistrer</button>
      </div>
    </div>
  </div>

  <!-- ── Modal : Confirmer désactivation ───────────────────── -->
  <div id="confirmModal" class="modal-overlay" hidden>
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="confirmTitle">Confirmer</h2>
        <button class="modal-close" id="confirmClose">×</button>
      </div>
      <div class="modal-body">
        <p id="confirmMessage"></p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="confirmCancel">Annuler</button>
        <button class="btn btn-danger"    id="confirmOk">Confirmer</button>
      </div>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../auth/auth.js"></script>
  <script src="../js/comptes.js"></script>
</body>
</html>
